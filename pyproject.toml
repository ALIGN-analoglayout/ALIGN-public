[build-system]
requires = [
    "setuptools",
    "wheel",
    "pybind11",
    "scikit-build",
    "cmake>=3.26,<4.0",
    "ninja"
]
build-backend = "setuptools.build_meta"

[tool.cibuildwheel]
build = "cp310-* cp311-* cp312-* cp313-*"
skip = "*-musllinux*"
build-verbosity = 1

[tool.cibuildwheel.linux]
archs = ["x86_64"]
manylinux-x86_64-image = "manylinux_2_24"
before-all = "apt-get update && apt-get install -y libboost-dev lp-solve"
environment = { BUILD_PLATFORM = "{AUDITWHEEL_PLAT}" }

[tool.cibuildwheel.macos]
archs = ["x86_64", "arm64"]
environment = { MACOSX_DEPLOYMENT_TARGET = "11.0" }
before-all = "brew install boost lp_solve || true"

[tool.cibuildwheel.windows]
archs = ["AMD64"]
