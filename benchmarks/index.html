<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ALIGN Release Benchmarks</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, sans-serif; max-width: 1100px; margin: 0 auto; padding: 20px; color: #333; }
  h1 { border-bottom: 2px solid #007bff; padding-bottom: 8px; }
  .tabs { display: flex; gap: 8px; margin: 16px 0; }
  .tab-btn { padding: 8px 20px; border: 1px solid #007bff; border-radius: 4px;
             background: white; color: #007bff; cursor: pointer; font-size: 14px; }
  .tab-btn.active { background: #007bff; color: white; }
  .tab { display: none; }
  .tab.active { display: block; }
  .circuit-card { border: 1px solid #ddd; border-radius: 6px; padding: 16px; margin: 12px 0; }
  .circuit-card h3 { margin-top: 0; color: #007bff; font-size: 16px; }
  .charts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .chart-wrap { position: relative; height: 140px; }
  .chart-label { font-size: 11px; color: #666; margin-bottom: 2px; }
  .regression-table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 13px; }
  .regression-table th { background: #f5f5f5; padding: 6px 10px; text-align: left; border: 1px solid #ddd; }
  .regression-table td { padding: 6px 10px; border: 1px solid #ddd; }
  .warn { background: #fff3cd; }
  .fail { background: #f8d7da; }
  .ok   { background: #d4edda; }
</style>
</head>
<body>
<h1>ALIGN Release Benchmarks</h1>
<p>Post-layout metrics tracked across PyPI releases. PDK: FinFET14nm_Mock_PDK.</p>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('layout', this)">Layout Quality</button>
  <button class="tab-btn"        onclick="showTab('simulation', this)">Simulation</button>
  <button class="tab-btn"        onclick="showTab('regressions', this)">Regressions</button>
</div>

<div id="layout" class="tab active">
  <h2>Layout Quality</h2>
  <div id="layout-content"></div>
</div>

<div id="simulation" class="tab">
  <h2>Post-Layout Simulation</h2>
  <div id="sim-content"></div>
</div>

<div id="regressions" class="tab">
  <h2>Regression Summary</h2>
  <div id="reg-content"></div>
</div>

<script>
const history = [{"version": "0.9.8", "circuits": [{"circuit": "buffer", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 113, "runtime_s": 40.88}, {"circuit": "five_transistor_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 448, "runtime_s": 24.25}, {"circuit": "high_speed_comparator", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 717, "runtime_s": 250.43}, {"circuit": "current_mirror_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 727, "runtime_s": 41.42}, {"circuit": "telescopic_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 176, "runtime_s": 48.73}], "regressions": {"warnings": [], "failures": []}}, {"version": "0.9.8", "circuits": [{"circuit": "buffer", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 230, "runtime_s": 42.2}, {"circuit": "five_transistor_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 786, "runtime_s": 16.86}, {"circuit": "high_speed_comparator", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 717, "runtime_s": 85.36}, {"circuit": "current_mirror_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 672, "runtime_s": 24.97}, {"circuit": "buffer", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 131, "runtime_s": 40.64}, {"circuit": "five_transistor_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 455, "runtime_s": 21.7}, {"circuit": "telescopic_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 197, "runtime_s": 51.8}, {"circuit": "current_mirror_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 0.0, "cell_width_um": 0.0, "cell_height_um": 0.0, "wirelength_um": 0.0, "via_count": 452, "runtime_s": 49.22}], "regressions": {"warnings": [{"circuit": "buffer|FinFET14nm_Mock_PDK", "metric": "via_count", "current": 131, "previous": 113, "pct_change": 15.93}, {"circuit": "telescopic_ota|SKY130_PDK", "metric": "via_count", "current": 197, "previous": 176, "pct_change": 11.93}, {"circuit": "current_mirror_ota|FinFET14nm_Mock_PDK", "metric": "runtime_s", "current": 49.22, "previous": 41.42, "pct_change": 18.83}], "failures": []}}, {"version": "0.9.8", "circuits": [{"circuit": "buffer", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 45.5112, "cell_width_um": 6.02, "cell_height_um": 7.56, "wirelength_um": 203.46, "via_count": 230, "runtime_s": 45.93}, {"circuit": "five_transistor_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 369.8688, "cell_width_um": 27.52, "cell_height_um": 13.44, "wirelength_um": 1372.27, "via_count": 786, "runtime_s": 17.04}, {"circuit": "high_speed_comparator", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 6.2093, "cell_width_um": 1.76, "cell_height_um": 3.528, "wirelength_um": 269.99, "via_count": 717, "runtime_s": 303.16}, {"circuit": "current_mirror_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 216.72, "cell_width_um": 8.6, "cell_height_um": 25.2, "wirelength_um": 1091.9, "via_count": 672, "runtime_s": 28.07}, {"circuit": "buffer", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 1.8816, "cell_width_um": 0.8, "cell_height_um": 2.352, "wirelength_um": 33.81, "via_count": 131, "runtime_s": 45.5}, {"circuit": "five_transistor_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 10.7251, "cell_width_um": 3.04, "cell_height_um": 3.528, "wirelength_um": 178.35, "via_count": 455, "runtime_s": 23.16}, {"circuit": "telescopic_ota", "version": "0.9.8", "pdk": "SKY130_PDK", "area_um2": 45.5112, "cell_width_um": 6.02, "cell_height_um": 7.56, "wirelength_um": 278.98, "via_count": 197, "runtime_s": 48.35}, {"circuit": "current_mirror_ota", "version": "0.9.8", "pdk": "FinFET14nm_Mock_PDK", "area_um2": 7.1501, "cell_width_um": 3.04, "cell_height_um": 2.352, "wirelength_um": 115.73, "via_count": 452, "runtime_s": 48.62}], "regressions": {"warnings": [], "failures": []}}];
const LAYOUT_METRICS = ["area_um2", "wirelength_um", "via_count", "runtime_s"];
const SIM_METRICS = {"buffer": ["tphl_ns", "tplh_ns"], "five_transistor_ota": ["gain_db", "ugbw_mhz", "phase_margin_deg"], "current_mirror_ota": ["gain_db", "bandwidth_mhz"], "high_speed_comparator": ["regen_time_ns", "static_power_uw"], "variable_gain_amplifier": ["gain_db", "bandwidth_mhz"], "switched_capacitor_filter": ["f3db_mhz", "passband_ripple_db"]};

function showTab(name, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  btn.classList.add('active');
}

const versions = history.map(r => r.version);

function miniChart(canvasId, label, versions, data) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return;
  new Chart(ctx, {
    type: 'line',
    data: {
      labels: versions,
      datasets: [{ label, data,
        borderColor: '#007bff', backgroundColor: 'rgba(0,123,255,0.08)',
        tension: 0.2, pointRadius: 3, fill: true }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { font: { size: 10 } } },
        y: { ticks: { font: { size: 10 } } }
      }
    }
  });
}

function getVals(circuit, metric) {
  return history.map(r => {
    const c = (r.circuits || []).find(x => x.circuit === circuit);
    return (c && c[metric] != null) ? c[metric] : null;
  });
}

function buildSection(containerId, circuits, metricsMap) {
  const container = document.getElementById(containerId);
  circuits.forEach(circuit => {
    const metrics = Array.isArray(metricsMap) ? metricsMap : (metricsMap[circuit] || []);
    const card = document.createElement('div');
    card.className = 'circuit-card';
    card.innerHTML = '<h3>' + circuit.replace(/_/g,' ') + '</h3><div class="charts-grid"></div>';
    const grid = card.querySelector('.charts-grid');
    metrics.forEach(metric => {
      const id = 'ch_' + circuit + '_' + metric;
      const wrap = document.createElement('div');
      wrap.innerHTML = '<div class="chart-label">' + metric + '</div><div class="chart-wrap"><canvas id="' + id + '"></canvas></div>';
      grid.appendChild(wrap);
      const vals = getVals(circuit, metric);
      setTimeout(() => miniChart(id, metric, versions, vals), 0);
    });
    container.appendChild(card);
  });
}

const circuits = history.length > 0
  ? [...new Set(history.flatMap(r => (r.circuits||[]).map(c => c.circuit)))]
  : [];

buildSection('layout-content', circuits, LAYOUT_METRICS);
buildSection('sim-content', circuits, SIM_METRICS);

const regContainer = document.getElementById('reg-content');
history.slice().reverse().forEach(release => {
  const regs = release.regressions || {};
  const all = [...(regs.failures||[]).map(r=>({...r,level:'fail'})),
               ...(regs.warnings||[]).map(r=>({...r,level:'warn'}))];
  const section = document.createElement('div');
  section.innerHTML = '<h3>' + release.version + '</h3>';
  if (!all.length) {
    section.innerHTML += '<p style="color:#28a745">&#10003; No regressions detected.</p>';
  } else {
    let html = '<table class="regression-table"><tr><th>Circuit</th><th>Metric</th><th>Previous</th><th>Current</th><th>Change %</th></tr>';
    all.forEach(r => {
      html += '<tr class="' + r.level + '"><td>' + r.circuit + '</td><td>' + r.metric +
              '</td><td>' + r.previous + '</td><td>' + r.current +
              '</td><td>' + (r.pct_change > 0 ? '+' : '') + r.pct_change + '%</td></tr>';
    });
    html += '</table>';
    section.innerHTML += html;
  }
  regContainer.appendChild(section);
});
</script>
</body>
</html>
