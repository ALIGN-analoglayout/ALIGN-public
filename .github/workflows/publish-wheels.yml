name: Build and Publish Wheels

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Cache ccache's object-file store between runs.
      # Key is a hash of all C++ sources, headers, and cmake files under
      # PlaceRouteHierFlow/.  When only align/*.py files change the key is
      # unchanged → full cache hit → ccache returns every .o instantly.
      # restore-keys allows partial reuse when only some C++ files changed.
      - name: Restore C++ build cache (ccache)
        uses: actions/cache@v4
        with:
          path: .ccache
          key: ccache-pnr-${{ matrix.os }}-${{ hashFiles('PlaceRouteHierFlow/**/*.cpp', 'PlaceRouteHierFlow/**/*.h', 'PlaceRouteHierFlow/**/*.hpp', 'CMakeLists.txt', 'PlaceRouteHierFlow/**/*.cmake') }}
          restore-keys: |
            ccache-pnr-${{ matrix.os }}-
          save-always: true

      - uses: pypa/cibuildwheel@v2.21

      - name: Show ccache stats
        if: always()
        run: |
          if command -v ccache >/dev/null 2>&1; then
            ccache --show-stats || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install build
        run: pip install build==1.2.2

      - name: Build sdist
        run: python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/align-analoglayout
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0 (release/v1 tip)
