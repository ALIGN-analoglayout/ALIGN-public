name: Release Benchmarks

on:
  workflow_run:
    workflows: ["Build and Publish Wheels"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to benchmark (e.g. v0.9.8)'
        required: true

jobs:
  benchmark:
    name: Benchmark ${{ matrix.circuit }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 90
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        circuit:
          - buffer
          - five_transistor_ota
          - current_mirror_ota
          - high_speed_comparator
    env:
      MAGIC_PREFIX: /home/runner/magic-install

    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(git describe --tags --abbrev=0)"
          fi
          # Strip leading 'v' for PyPI install
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Cache Magic VLSI
        id: cache-magic
        uses: actions/cache@v4
        with:
          path: ${{ env.MAGIC_PREFIX }}
          key: magic-8.3.664-ubuntu24-v2

      - name: Build Magic VLSI from source
        if: steps.cache-magic.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tcl-dev tk-dev libcairo2-dev libncurses-dev
          git clone --depth 1 --branch 8.3.664 https://github.com/RTimothyEdwards/magic magic-src
          cd magic-src
          ./configure --prefix="$MAGIC_PREFIX"
          make -j4
          make install

      - name: Add Magic to PATH
        run: echo "$MAGIC_PREFIX/bin" >> $GITHUB_PATH

      - name: Install ngspice and COIN-OR runtime libs
        run: sudo apt-get install -y ngspice coinor-libcgl1 coinor-libcbc3.1 coinor-libosi1v5

      - name: Install ALIGN from PyPI
        run: |
          pip install align-analoglayout==${{ steps.version.outputs.version }}

      - name: Set up work directory
        run: mkdir -p work/${{ matrix.circuit }}

      - name: Run ALIGN layout
        run: |
          bash benchmarks/scripts/run_align.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            $GITHUB_WORKSPACE \
            ${{ steps.version.outputs.version }}

      - name: Run Magic extraction
        run: |
          bash benchmarks/scripts/run_extraction.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            benchmarks/magic_tech/FinFET14nm_Mock_PDK

      - name: Run ngspice simulation
        run: |
          bash benchmarks/scripts/run_simulation.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            benchmarks/testbenches \
            $GITHUB_WORKSPACE/examples/${{ matrix.circuit }}/${{ matrix.circuit }}.sp

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.circuit }}
          path: work/${{ matrix.circuit }}/metrics.json

  benchmark-sky130:
    name: Benchmark sky130 ${{ matrix.circuit }}
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 90
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        circuit:
          - buffer
          - five_transistor_ota
          - current_mirror_ota
          - telescopic_ota
    env:
      MAGIC_PREFIX: /home/runner/magic-install

    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(git describe --tags --abbrev=0)"
          fi
          # Strip leading 'v' for PyPI install
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "full_version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT

      - name: Cache Magic VLSI
        id: cache-magic
        uses: actions/cache@v4
        with:
          path: ${{ env.MAGIC_PREFIX }}
          key: magic-8.3.664-ubuntu24-v2

      - name: Build Magic VLSI from source
        if: steps.cache-magic.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y tcl-dev tk-dev libcairo2-dev libncurses-dev
          git clone --depth 1 --branch 8.3.664 https://github.com/RTimothyEdwards/magic magic-src
          cd magic-src
          ./configure --prefix="$MAGIC_PREFIX"
          make -j4
          make install

      - name: Add Magic to PATH
        run: echo "$MAGIC_PREFIX/bin" >> $GITHUB_PATH

      - name: Install ngspice and COIN-OR runtime libs
        run: sudo apt-get install -y ngspice coinor-libcgl1 coinor-libcbc3.1 coinor-libosi1v5

      - name: Install ALIGN from PyPI
        run: |
          pip install align-analoglayout==${{ steps.version.outputs.version }}

      - name: Set up work directory
        run: mkdir -p work/${{ matrix.circuit }}

      - name: Clone sky130 PDK
        run: git clone --depth 1 https://github.com/ALIGN-analoglayout/ALIGN-pdk-sky130 sky130-pdk

      - name: Install real sky130 BSIM4 models via volare
        id: sky130-models
        continue-on-error: true
        run: |
          pip install volare
          # bdc9412b is a stable sky130A open_pdks snapshot used by OpenLane2
          volare enable --pdk sky130 bdc9412b3e468c102d01b7cf6337be06ec6e9c9a
          echo "SKY130_MODELS=$HOME/.volare/sky130A/libs.tech/ngspice/sky130.lib.spice" >> $GITHUB_ENV

      - name: Run ALIGN layout
        run: |
          bash benchmarks/scripts/run_align.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            $GITHUB_WORKSPACE \
            ${{ steps.version.outputs.version }} \
            $GITHUB_WORKSPACE/sky130-pdk/SKY130_PDK \
            $GITHUB_WORKSPACE/sky130-pdk/examples/${{ matrix.circuit }}

      - name: Run Magic extraction
        run: |
          bash benchmarks/scripts/run_extraction.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            benchmarks/magic_tech/SKY130_PDK

      - name: Run ngspice simulation
        run: |
          bash benchmarks/scripts/run_simulation.sh \
            ${{ matrix.circuit }} \
            work/${{ matrix.circuit }} \
            benchmarks/testbenches/sky130 \
            $GITHUB_WORKSPACE/sky130-pdk/examples/${{ matrix.circuit }}/${{ matrix.circuit }}.sp \
            "${SKY130_MODELS:-}"

      - name: Upload metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics-sky130-${{ matrix.circuit }}
          path: work/${{ matrix.circuit }}/metrics.json

  aggregate-and-publish:
    name: Aggregate and Publish Dashboard
    runs-on: ubuntu-latest
    needs: [benchmark, benchmark-sky130]
    if: always()
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get release version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="$(git describe --tags --abbrev=0)"
          fi
          # Strip leading 'v' for PyPI install
          VERSION=${VERSION#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Download all metrics artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: metrics-*
          path: artifacts/

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Ensure benchmarks dir on gh-pages
        run: mkdir -p gh-pages/benchmarks

      - name: Create empty history if absent
        run: |
          if [ ! -f gh-pages/benchmarks/history.json ]; then
            echo '[]' > gh-pages/benchmarks/history.json
          fi

      - name: Aggregate metrics
        run: |
          python3 benchmarks/scripts/aggregate.py \
            artifacts/ \
            gh-pages/benchmarks/history.json \
            ${{ steps.version.outputs.version }} \
            benchmarks/config.json

      - name: Render dashboard
        run: |
          python3 benchmarks/scripts/render_dashboard.py \
            gh-pages/benchmarks/history.json \
            gh-pages/benchmarks/index.html

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/
          git diff --cached --quiet || git commit -m "benchmarks: add results for ${{ steps.version.outputs.version }}"
          git push
